<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Giulio Giamello</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            color: #fff;
            padding: 0.5rem 1rem;
        }
        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        nav {
            display: flex;
            justify-content: center;
            background: #444;
            padding: 0.5rem 0;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 2rem;
        }
        .hero {
            text-align: center;
            padding: 2rem 1rem;
            background: #eee;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1rem;
        }
        .content {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
        }
        .content img {
            max-width: 150px;
            border-radius: 10px;
        }
        .content p {
            text-align: left;
        }
        footer {
    background: #333;
    color: #fff;
    padding: 1rem;
    margin-top: 2rem;
}

.footer-content {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem; /* Space between the text and the LinkedIn icon */
}

.footer-content p {
    margin: 0; /* Removes default margin for alignment */
}

.linkedin-button i {
    font-size: 24px; /* Adjust the size of the LinkedIn icon */
    color: #fff; /* Icon color */
    transition: color 0.3s ease; /* Smooth hover effect */
}

.linkedin-button i:hover {
    color: #0077b5; /* LinkedIn blue on hover */
}
    </style>
</head>
<body>
    <header>
        <h1>Giulio Giamello</h1>
        <nav>
        	<a href="index.html">Home</a>
        	<a href="about.html">About Me</a>
    	</nav>
    </header>
    <div class="container">
        <section class="hero">
            <section class="content">
                <img src="foto_profilo_professionale.png" alt="foto_profilo_professionale" width="200">
                <p>Hi, I'm Giulio Giamello, from Siena, Italy.<br><br>
                <i>"I’m a physics master student mainly interested in particle physics, methods for trajectory reconstruction, coding and machine learning".
                </i></p>
            </section>
        </section>
    </div>
    <footer>
    <div class="footer-content">
        <p>Last update on 17th January 2025</p>
        <a class="linkedin-button" href="https://www.linkedin.com/in/yourprofile" target="_blank">
            <i class="fab fa-linkedin"></i>
        </a>
    </div>
</footer>
</body>
</html>
