<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Giulio Giamello</title>
    <style>
        /* General styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Header styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            color: #fff;
            padding: 0.5rem 1rem;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Main container styles */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 2rem;
        }

        /* Hero section */
        .hero {
            text-align: center;
            padding: 2rem 1rem;
            background: #eee;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1rem;
        }

        /* Content styles */
        .content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
        }

        .content img {
            max-width: 100%;
            width: 150px;
            border-radius: 10px;
        }

        .content p {
            text-align: left;
            flex: 1;
        }

        /* Footer styles */
        footer {
            background: #333;
            color: #fff;
            padding: 1rem;
            margin-top: 2rem;
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            text-align: center;
        }

        .footer-content p {
            margin: 0;
            flex: 1;
        }

        .linkedin-button i {
            font-size: 24px;
            color: #fff;
            transition: color 0.3s ease;
        }

        .linkedin-button i:hover {
            color: #0077b5;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            nav {
                flex-direction: column;
                gap: 0.5rem;
            }

            .content {
                flex-direction: column;
                text-align: center;
            }

            .content p {
                text-align: center;
            }

            .footer-content {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.2rem;
            }

            .hero h1 {
                font-size: 1.5rem;
            }

            .hero p {
                font-size: 0.9rem;
            }

            .content img {
                width: 100px; /* Adjust image width on smaller screens */
            }

            .linkedin-button i {
                font-size: 20px;
            }

            .footer-content {
                gap: 1rem; /* Add more space between text and icon on smaller screens */
                flex-direction: column-reverse; /* Change order to place the LinkedIn icon above the text */
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Giulio Giamello</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
        </nav>
    </header>
    <div class="container">
        <section class="hero">
            <section class="content">
                <img src="foto_profilo_professionale.png" alt="foto_profilo_professionale" width="200">
                <p>Hi, I'm Giulio Giamello, from Siena, Italy.<br><br>
                <i>"I’m a physics master student mainly interested in particle physics, methods for trajectory reconstruction, coding and machine learning".</i></p>
            </section>
        </section>
    </div>
    <footer>
        <div class="footer-content">
            <a class="linkedin-button" href="https://www.linkedin.com/in/giulio-giamello" target="_blank">
                <i class="fab fa-linkedin"></i>
            </a>
            <p>Last update on 17th January 2025</p>
        </div>
    </footer>
</body>
</html>
